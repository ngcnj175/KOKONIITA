<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ffffff" />
  <title>ココニイタ。</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Yomogi&family=Klee+One:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- レーダー画面 -->
  <section id="radar-screen" class="screen">
    <header class="topbar">
      <h1 class="brand">KOKONI-ITA</h1>
      <div class="topbar-right">
        <button id="user-chip" class="chip user-chip hidden" type="button">
          <img id="user-avatar" class="user-avatar hidden" alt="" />
          <span id="user-label" class="user-label">サインイン</span>
        </button>
      </div>
    </header>

    <div class="radar-wrap">
      <div id="range-label" class="range-chip" aria-live="polite">500m</div>
      <div class="range-zoom" role="group" aria-label="表示範囲">
        <button id="range-up" class="range-zoom-btn" type="button" aria-label="広く表示">▲</button>
        <button id="range-down" class="range-zoom-btn" type="button" aria-label="狭く表示">▼</button>
      </div>
      <div id="radar-map" class="radar-map" aria-hidden="true"></div>
      <svg id="radar" viewBox="-100 -100 200 200" preserveAspectRatio="xMidYMid meet">
        <defs>
          <linearGradient id="ring-depth" x1="0" y1="-98" x2="0" y2="98" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#6FBF5A" stop-opacity="0.08" />
            <stop offset="0.45" stop-color="#6FBF5A" stop-opacity="0.35" />
            <stop offset="1" stop-color="#6FBF5A" stop-opacity="1" />
          </linearGradient>
        </defs>
        <!-- 外周リング（奥ほど薄く=細く見える） -->
        <g class="radar-rings">
          <circle r="98" class="ring outer-depth" />
        </g>
        <!-- 方位に合わせて回転するレイヤー -->
        <g id="radar-rotate">
          <!-- 北マーカー（自分の向き基準、回転する） -->
          <text x="0" y="-90" class="compass-n" text-anchor="middle">N</text>
          <!-- 記憶ピンはJSで動的追加 -->
          <g id="memory-layer"></g>
          <!-- 圏外方向インジケータ -->
          <g id="edge-layer"></g>
        </g>
        <!-- 自分の位置マーカー（親SVGの scaleY(0.6) を打ち消す） -->
        <g id="me-marker" transform="scale(0.75,1.25)">
          <!-- 接地影 -->
          <ellipse cx="0" cy="3" rx="7" ry="1.4" fill="#000" opacity="0.18"/>
          <!-- 胴：左面（明）／右面（暗） -->
          <polygon points="0,-18 0,2 -6,-8" fill="#7BC96F"/>
          <polygon points="0,-18 6,-8 0,2" fill="#2F8F3D"/>
          <!-- 頭：左半（明）／右半（暗） -->
          <path d="M0,-29 A5,5 0 0,0 0,-19 Z" fill="#7BC96F"/>
          <path d="M0,-29 A5,5 0 0,1 0,-19 Z" fill="#2F8F3D"/>
        </g>
      </svg>

      <div class="radar-hud">
        <p id="hud-status" class="hud-line">位置情報を取得しています…</p>
        <p id="hud-hint" class="hud-hint hidden">空を仰いで、少し立ち止まって。</p>
      </div>
    </div>

    <footer class="bottombar">
      <button id="ar-btn" class="ghost-btn" type="button">AR</button>
      <button id="place-btn" class="place-btn" type="button">＋ 記憶を置く</button>
      <button id="history-btn" class="ghost-btn" type="button">履歴</button>
    </footer>
  </section>

  <!-- 隠しファイル入力（＋記憶を置く から直接呼ぶ） -->
  <input id="media-input" type="file" accept="image/*" hidden />

  <!-- 記憶を置くボトムシート（写真選択後にせり上がる） -->
  <div id="compose-sheet" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheet-backdrop" id="compose-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <header class="sheet-head">
        <h2 class="sheet-title">記憶を置く</h2>
        <button id="compose-cancel" class="chip" type="button">やめる</button>
      </header>
      <div class="compose-body">
        <div class="cropper-wrap">
          <div class="cropper" id="cropper">
            <img id="cropper-img" alt="" />
            <div class="cropper-grid" aria-hidden="true"></div>
          </div>
          <div class="zoom-row">
            <span class="dim small">−</span>
            <input type="range" id="zoom-slider" min="1" max="4" step="0.01" value="1" />
            <span class="dim small">＋</span>
          </div>
          <p class="dim small crop-hint">ドラッグで移動・ピンチ／スライダーで拡大</p>
        </div>
        <label class="field">
          <span>メッセージ（任意）</span>
          <textarea id="note-input" maxlength="140" rows="3" placeholder="ここに残す言葉"></textarea>
        </label>
        <label class="field check">
          <input id="private-toggle" type="checkbox" />
          <span class="check-label">自分だけに表示（マップにも出さない）</span>
        </label>
        <button id="save-btn" class="place-btn wide" type="button">ここに置く</button>
      </div>
    </div>
  </div>

  <!-- トースト -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <!-- AR画面 -->
  <section id="ar-screen" class="screen hidden">
    <video id="ar-video" class="ar-video" autoplay playsinline muted></video>
    <div id="ar-overlay" class="ar-overlay"></div>
    <div class="ar-hud-top">
      <button id="ar-back" class="chip back" type="button">← 戻る</button>
      <span id="ar-count" class="chip ar-count">周辺: 0</span>
    </div>
    <div class="ar-hud-bottom">
      <p id="ar-hint" class="ar-hint">端末をゆっくり動かして周囲を見渡してください</p>
    </div>
    <div id="ar-error" class="ar-error hidden">
      <p id="ar-error-msg"></p>
      <button id="ar-error-back" class="primary" type="button">戻る</button>
    </div>
  </section>

  <!-- 履歴ボトムシート -->
  <div id="history-sheet" class="sheet hidden" role="dialog" aria-modal="true">
    <div class="sheet-backdrop" id="history-backdrop"></div>
    <div class="sheet-panel">
      <div class="sheet-handle"></div>
      <header class="sheet-head">
        <h2 class="sheet-title">置いた記憶</h2>
        <button id="history-close" class="chip" type="button">閉じる</button>
      </header>
      <div id="history-list" class="history-list"></div>
      <p id="history-empty" class="history-empty dim hidden">まだ記憶は置かれていません</p>
    </div>
  </div>

  <!-- 記憶詳細（レーダーの点タップで開く） -->
  <div id="viewer" class="viewer hidden" role="dialog" aria-modal="true">
    <div id="viewer-locked" class="locked-card hidden">
      <p class="locked-title">まだ近づいていない</p>
      <p class="locked-sub">半径20mまで近づくと解放されます</p>
      <p id="viewer-distance" class="dim"></p>
    </div>
    <div id="viewer-open" class="hidden">
      <div class="polaroid-flip" id="polaroid-flip">
        <div class="flip-inner">
          <div class="flip-face flip-front">
            <div class="polaroid-frame small">
              <img id="viewer-img" alt="memory" />
            </div>
          </div>
          <div class="flip-face flip-back">
            <div class="polaroid-frame small back">
              <p id="viewer-note" class="handwritten"></p>
              <span id="viewer-meta" class="viewer-meta"></span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- 位置精度ガイド -->
  <div id="accuracy-prompt" class="modal hidden">
    <div class="modal-card accuracy-card">
      <p class="accuracy-title">空を仰いで、少し立ち止まって。</p>
      <p class="accuracy-sub">WiFi と Bluetooth を灯しておくと、なお。</p>
      <p id="accuracy-current" class="dim small"></p>
      <div class="actions">
        <button id="accuracy-close" class="primary" type="button">わかった</button>
      </div>
    </div>
  </div>

  <!-- 方位センサー許可プロンプト（iOS用） -->
  <div id="orient-prompt" class="modal hidden">
    <div class="modal-card">
      <h3>方位センサーの利用</h3>
      <p class="dim small">レーダーを端末の向きに合わせるため、方位センサーの使用を許可してください。</p>
      <div class="actions">
        <button id="orient-allow" class="primary" type="button">許可する</button>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
